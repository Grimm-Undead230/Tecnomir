<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог - Техномир</title>
    <link rel="stylesheet" href="csski/main.css">
    <link rel="stylesheet" href="csski/catalog.css">
</head>
<body>
    <main>
        <header>
            <div class="container">
                <a href="index.html" class="logo-link"><img src="img/logo.png" alt="Техномир" class="logo-image"></a>
                <div class="header-actions">
                    <div class="contacts-text">
                        <a href="tel:+996XXXXXXXXX" class="contact-phone">+996 XXX XXX XXX</a>
                        <a href="tel:+996XXXXXXXXX" class="contact-phone">+996 XXX XXX XXX</a>
                    </div>
                    <div class="search-container">
                        <input type="text" class="search-input" placeholder="Поиск товаров...">
                        <button class="search-btn">🔍</button>
                        <button class="clear-btn">✕</button>
                    </div>
                </div>
            </div>
        </header>

        <nav class="main-nav">
            <div class="container">
                <ul class="nav-menu">
                    <li><a href="index.html" class="nav-link">Главная</a></li>
                    <li><a href="catalog.html" class="nav-link active">Каталог</a></li>
                    <li><a href="catalog.html?category=components" class="nav-link">Комплектующие</a></li>
                    <li><a href="catalog.html?category=cctv" class="nav-link">Видеонаблюдение</a></li>
                    <li><a href="catalog.html?category=laptops" class="nav-link">Ноутбуки</a></li>
                    <li><a href="orders.html" class="nav-link">Мои заказы</a></li>
                    <li><a href="magazzz.html" class="nav-link"><img src="img/shopping-cart.svg" alt="Корзина" style="width: 20px; height: 20px;"></a></li>
                </ul>
            </div>
        </nav>

        <section class="catalog-page">
            <div class="container">
                <h1 class="catalog-title">Каталог товаров</h1>
                <div class="filters">
                    <button class="filter-btn active" data-cat="all">Все</button>
                    <button class="filter-btn" data-cat="components">💻 Комплектующие</button>
                    <button class="filter-btn" data-cat="periphery">🖱️ Периферия</button>
                    <button class="filter-btn" data-cat="cctv">📹 Видеонаблюдение</button>
                    <button class="filter-btn" data-cat="laptops">💻 Ноутбуки</button>
                </div>
                <div class="products-grid" id="productsGrid">
                    <div class="loading">Загрузка...</div>
                </div>
            </div>
        </section>

        <footer class="footer">
            <div class="container">
                <div class="footer-content">
                    <div class="footer-logo"><img src="img/logo.png" alt="Техномир" class="footer-logo-img"><p class="footer-description">Интернет-магазин компьютерной техники</p></div>
                </div>
                <div class="footer-bottom"><p>© 2026 Техномир. Все права защищены.</p></div>
            </div>
        </footer>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="scripts/supabase.js"></script>
    <script src="scripts/catalog.js"></script>
</body>
</html>
