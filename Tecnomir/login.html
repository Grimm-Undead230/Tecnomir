<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Техномир</title>
    <link rel="stylesheet" href="csski/main.css">
    <link rel="stylesheet" href="csski/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>Вход</h1>
            <p class="login-subtitle">Войдите в свой аккаунт</p>
            <input type="text" id="username" placeholder="Логин" autocomplete="username">
            <input type="password" id="password" placeholder="Пароль" autocomplete="current-password">
            <button id="loginBtn">Войти</button>
            <div class="info">
                <a href="register.html">Зарегистрироваться</a>
            </div>
            <div id="errorMsg" class="error"></div>
        </div>
    </div>
    

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="scripts/supabase.js"></script>
    <script src="scripts/login.js"></script>
</body>
</html>
